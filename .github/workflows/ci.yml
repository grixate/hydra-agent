name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: hydra_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hydra_agent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MIX_ENV: test
      TEST_DATABASE_URL: ecto://postgres@localhost/hydra_agent_test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.4"
          otp-version: "27.3.4"

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Run CI gate
        run: mix ci

      - name: Audit browser worker dependencies
        run: npm --prefix services/browser-worker audit --audit-level=high

      - name: Validate production scripts
        run: |
          bash -n scripts/*.sh
          node --check services/browser-worker/server.js

  deployment:
    runs-on: ubuntu-latest

    env:
      PHX_HOST: hydra.example.test
      POSTGRES_PASSWORD: postgres-ci-password
      SECRET_KEY_BASE: 4dW2dA59kUjS45Kz6Km7PkUzyTNjCYR4nSLQm5egT1hoNdM1H99cE4gtKUiP1/3U
      HYDRA_API_TOKEN: ci-api-token-ci-api-token
      HYDRA_ADMIN_USERNAME: admin
      HYDRA_ADMIN_PASSWORD: admin-password-for-ci
      HYDRA_BROWSER_WORKER_TOKEN: ci-browser-worker-token-ci
      HYDRA_BACKUP_CONFIGURED: "true"
      HYDRA_SMOKE_FAIL_ON_WARNING: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Validate production env
        run: scripts/prod-env-check.sh

      - name: Validate production Compose config
        run: docker compose -f docker-compose.prod.yml --profile migrate --profile smoke config --quiet

      - name: Validate Caddy config
        run: |
          docker run --rm \
            -e PHX_HOST="${PHX_HOST}" \
            -v "${PWD}/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile

      - name: Smoke production Compose deployment
        run: |
          set -euo pipefail

          cleanup() {
            docker compose -f docker-compose.prod.yml --profile migrate --profile smoke down -v --remove-orphans
          }
          trap cleanup EXIT

          docker compose -f docker-compose.prod.yml --profile migrate --profile smoke build browser-worker app migrate smoke
          docker compose -f docker-compose.prod.yml up -d postgres browser-worker
          docker compose -f docker-compose.prod.yml --profile migrate run --rm migrate
          docker compose -f docker-compose.prod.yml up -d app

          for attempt in {1..30}; do
            if docker compose -f docker-compose.prod.yml exec -T app curl -fsS http://127.0.0.1:4000/api/health; then
              break
            fi

            if [ "$attempt" = "30" ]; then
              docker compose -f docker-compose.prod.yml logs app
              exit 1
            fi

            sleep 2
          done

          docker compose -f docker-compose.prod.yml --profile smoke run --rm smoke

          mkdir -p release-artifacts
          docker compose -f docker-compose.prod.yml --profile migrate --profile smoke config > release-artifacts/docker-compose.resolved.yml
          docker compose -f docker-compose.prod.yml --profile migrate --profile smoke images > release-artifacts/compose-images.txt
          docker image inspect hydra-browser-worker:prod > release-artifacts/browser-worker-image.json

      - name: Upload deployment proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-proof
          path: release-artifacts
          if-no-files-found: ignore
